# Tracked 13F filers — "smart money" whose SEC 13F-HR holdings we aggregate.
#
# The 13F signal is cost-FLAT: we fetch these managers' filings once per run
# (cached weekly) and every ticker lookup is then a dict hit, so adding more
# names to the universe costs nothing extra here. Cost scales with THIS list.
#
# cik: 10-digit SEC CIK of the FILER (the fund/manager), zero-padded is fine
# without leading zeros — the adapter normalizes. A wrong/dead CIK is skipped
# gracefully (no filings -> ignored), so pruning is safe.
#
# Edit freely: add managers you respect, remove ones you don't. Keep the list
# diversified (value + growth) and modest in size (~10-20) to stay fast.
