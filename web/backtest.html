<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairEntry Backtest</title>
<style>
  :root{
    --bg:#eef1f6;--panel:#fff;--panel-2:#f4f6fb;--sunk:#e8ecf4;--ink:#171b23;--ink-soft:#4a5262;--ink-faint:#657083;
    --line:#dde2ec;--line-soft:#e9edf4;--accent:#4a5ee0;--accent-soft:#e7eafd;
    --buy:#1f9d55;--buy-bg:#e2f4e9;--buy-text:#0f6e3a;--watch:#b07d13;--watch-bg:#f7eed6;--watch-text:#835d10;
    --avoid:#cf3a54;--avoid-bg:#fbe4e8;--avoid-text:#b81d39;--mono:ui-monospace,"Cascadia Code","JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media(prefers-color-scheme:dark){:root{--bg:#0d1016;--panel:#161b23;--panel-2:#1b212b;--sunk:#11151c;--ink:#e7ebf2;--ink-soft:#b3bccb;--ink-faint:#8b95a8;--line:#28303c;--line-soft:#1f2630;--accent:#8496ff;--accent-soft:#1c2440;--buy:#43c47a;--buy-bg:#11291b;--buy-text:#5ad78d;--watch:#e0ad42;--watch-bg:#2a2410;--watch-text:#eeba55;--avoid:#eb6a80;--avoid-bg:#2c1620;--avoid-text:#f38ba0}}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px}a{color:inherit;text-decoration:none}
  .topbar{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:12px 20px;flex-wrap:wrap}
  .logo{font-weight:800;font-size:19px}.logo b{color:var(--accent)}.tag{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}.spacer{flex:1}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700}
  .wrap{padding:18px 20px 56px;max-width:1240px;margin:0 auto}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-bottom:16px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}.body{padding:16px}.head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}.head h2{margin:0;font-size:16px}
  .status{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800}.status.good{background:var(--buy-bg);color:var(--buy-text)}.status.warn{background:var(--watch-bg);color:var(--watch-text)}
  .title{font-size:28px;font-weight:850;letter-spacing:-.02em;margin:0 0 8px}.sub{color:var(--ink-soft);line-height:1.55;margin:0}.meta{font-family:var(--mono);color:var(--ink-faint);font-size:12px;margin-top:12px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.stat{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:10px;padding:12px}.k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:800}.v{font-family:var(--mono);font-size:23px;font-weight:850;margin-top:3px}.pos{color:var(--buy-text)}.neg{color:var(--avoid-text)}
  table{width:100%;border-collapse:collapse}th,td{padding:10px 9px;border-bottom:1px solid var(--line-soft)}th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint)}td.num,th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  .pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:850}.Buy{background:var(--buy-bg);color:var(--buy-text)}.Watch{background:var(--watch-bg);color:var(--watch-text)}.Avoid{background:var(--avoid-bg);color:var(--avoid-text)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.note{color:var(--ink-soft);line-height:1.55;font-size:13px}.bar{height:7px;background:var(--sunk);border-radius:4px;overflow:hidden}.bar i{display:block;height:100%;background:var(--accent)}
  .empty{padding:36px;text-align:center;color:var(--ink-faint);line-height:1.6}.small{font-size:12px;color:var(--ink-faint);font-family:var(--mono)}
  @media(max-width:860px){.hero,.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr}.tablewrap{overflow-x:auto}table{min-width:720px}}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="logo">Fair<b>Entry</b></a><span class="tag">historical backtest</span>
  <span class="spacer"></span>
  <a class="btn" href="index.html">Board</a>
  <a class="btn" href="portfolio.html">Portfolio</a>
</div>
<main class="wrap" id="app"><section class="panel"><div class="empty">Loading backtest report...</div></section></main>
<script>
(function(){
"use strict";
var $=function(s,r){return (r||document).querySelector(s);};
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function pct(x){return x==null||!isFinite(x)?"-":(x>=0?"+":"")+Number(x).toFixed(2)+"%";}
function num(x){return x==null?"-":Number(x).toLocaleString();}
function row(v,d){return '<tr><td><span class="pill '+v+'">'+v+'</span></td><td class="num">'+num(d.n)+'</td><td class="num '+(d.mean_alpha_pct>=0?'pos':'neg')+'">'+pct(d.mean_alpha_pct)+'</td><td class="num">'+pct(d.median_alpha_pct)+'</td><td class="num">'+Number(d.hit_rate_pct).toFixed(1)+'%</td><td class="num">'+pct(d.mean_raw_return_pct)+'</td></tr>';}
function cohortRow(c){return '<tr><td>'+esc(c.entry)+'</td><td>'+esc(c.exit)+'</td><td class="num">'+num(c.n)+'</td><td class="num">'+num(c.buy_n)+'</td><td class="num '+(c.mkt_return_pct>=0?'pos':'neg')+'">'+pct(c.mkt_return_pct)+'</td><td class="num '+(c.buy_alpha_pct>=0?'pos':'neg')+'">'+pct(c.buy_alpha_pct)+'</td></tr>';}
function render(b){
  if(!b.ok){$("#app").innerHTML='<section class="panel"><div class="empty">Backtest not ready: '+esc(b.reason||"unknown")+'</div></section>';return;}
  var buy=b.by_verdict.Buy||{}, watch=b.by_verdict.Watch||{}, avoid=b.by_verdict.Avoid||{};
  var healthy=b.monotonic && (b.buy_minus_avoid_pct||0)>0;
  var latest=(b.per_cohort||[]).slice(-12);
  $("#app").innerHTML=
    '<section class="hero">'+
      '<div class="panel"><div class="body">'+
        '<span class="status '+(healthy?'good':'warn')+'">'+(healthy?'Validated':'Needs review')+'</span>'+
        '<h1 class="title">Buy beat Avoid, but the ladder is not perfect</h1>'+
        '<p class="sub">This rolling replay uses the generated SEC + yfinance history. Alpha means each stock return minus the average stock in that same cohort, so it measures stock selection rather than market direction.</p>'+
        '<div class="meta">'+esc(b.window[0])+' -> '+esc(b.window[1])+' · '+num(b.cohorts)+' cohorts · hold '+esc(b.hold_days)+'d / step '+esc(b.step_days)+'d</div>'+
        '<div class="stats">'+
          '<div class="stat"><div class="k">Buy alpha</div><div class="v pos">'+pct(buy.mean_alpha_pct)+'</div></div>'+
          '<div class="stat"><div class="k">Buy - Avoid</div><div class="v '+(b.buy_minus_avoid_pct>=0?'pos':'neg')+'">'+pct(b.buy_minus_avoid_pct)+'</div></div>'+
          '<div class="stat"><div class="k">Monotonic</div><div class="v">'+esc(String(b.monotonic))+'</div></div>'+
        '</div>'+
      '</div></div>'+
      '<div class="panel"><div class="head"><h2>Read This First</h2></div><div class="body note">'+
        '<p><b>Good:</b> Buy generated positive alpha and a better hit-rate than Avoid.</p>'+
        '<p><b>Caution:</b> Avoid also beat Watch in this run, so the score ladder is not fully clean. Treat this as evidence to refine the model, not proof.</p>'+
        '<p class="small">Free-data limitation: analyst targets, short float, beta, and news history are not point-in-time here.</p>'+
      '</div></div>'+
    '</section>'+
    '<section class="grid">'+
      '<div class="panel"><div class="head"><h2>Verdict Buckets</h2></div><div class="tablewrap"><table><thead><tr><th>Verdict</th><th class="num">N</th><th class="num">Mean alpha</th><th class="num">Median</th><th class="num">Hit-rate</th><th class="num">Raw return</th></tr></thead><tbody>'+
        row("Buy",buy)+row("Watch",watch)+row("Avoid",avoid)+
      '</tbody></table></div></div>'+
      '<div class="panel"><div class="head"><h2>Latest Cohorts</h2></div><div class="tablewrap"><table><thead><tr><th>Entry</th><th>Exit</th><th class="num">Names</th><th class="num">Buys</th><th class="num">Market</th><th class="num">Buy alpha</th></tr></thead><tbody>'+
        latest.map(cohortRow).join("")+
      '</tbody></table></div></div>'+
    '</section>';
}
fetch("data/backtest.json",{cache:"no-store"}).then(function(r){if(!r.ok)throw new Error("missing");return r.json();}).then(render).catch(function(){
  $("#app").innerHTML='<section class="panel"><div class="empty">No UI backtest report found yet.<br><span class="small">Run: python scripts\\seed_backtest.py --sec-history --limit 150<br>then: python scripts\\backtest.py --db data\\backtest.db --rolling --hold 30 --step 7 --json-out web\\data\\backtest.json</span></div></section>';
});
})();
</script>
</body>
</html>
