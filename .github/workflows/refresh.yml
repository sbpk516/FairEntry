name: FairEntry — refresh + deploy

# Twice daily (05:00 / 14:00 ET ≈ 09:00 / 18:00 UTC) + weekly AI review
# (Mon 08:00 UTC, with --reason) + on push to main + manual.
on:
  push:
    branches: [main]
    # Skip re-deploying for changes that can't affect the built site.
    paths-ignore:
      - "docs/**"
      - "tests/**"
      - "README.md"
  schedule:
    - cron: "0 9 * * *"      # daily — deterministic refresh
    - cron: "0 18 * * *"     # daily — deterministic refresh
    - cron: "0 8 * * 1"      # Monday — weekly run WITH the LLM reasoning layer
  workflow_dispatch:
    inputs:
      reason:
        description: "Run the LLM reasoning layer (needs DEEPSEEK_API_KEY + balance)"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: fairentry-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FINVIZ_API_KEY: ${{ secrets.FINVIZ_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      # Restore the store (SQLite + adapter caches) from the most recent prior
      # run. metrics_history is append-only and point-in-time, so persisting it
      # across runs is what lets the backtest harness and the estimate-revision
      # signal actually accumulate history (a fresh DB each run stays at one
      # snapshot forever). Unique key per run always saves a new entry;
      # restore-keys picks up the latest previous one.
      - name: Restore accumulated store
        uses: actions/cache@v4
        with:
          path: data
          key: fairentry-store-${{ github.run_id }}
          restore-keys: |
            fairentry-store-
      - name: Validate config
        run: python -m fairentry.config
      # Run the LLM reasoning layer when: the weekly Monday cron fires, the manual
      # dispatch requests it, OR a push commit message contains "[reason]" (a
      # handy on-demand lever to force/seed an AI-review pass). The twice-daily
      # crons and ordinary pushes stay deterministic (no LLM cost). Reasoned
      # theses are persisted, so later deterministic builds keep showing them.
      - name: Build (refresh -> screen -> score -> export)
        run: python scripts/build_all.py --refresh ${{ (github.event.inputs.reason == 'true' || github.event.schedule == '0 8 * * 1' || contains(github.event.head_commit.message, '[reason]')) && '--reason' || '' }}
      - name: Upload master.db artifact (regenerable; not committed)
        uses: actions/upload-artifact@v4
        with:
          name: fairentry-db
          path: data/fairentry.db
          retention-days: 7
      - name: Upload Pages artifact (the web app + board.json)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
